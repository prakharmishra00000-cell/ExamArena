<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Background with Gradient -->
  <rect width="1200" height="630" fill="#050810"/>
  <rect width="1200" height="630" fill="url(#paint0_radial)" opacity="0.8"/>
  
  <!-- Subtle Grid overlay -->
  <path d="M0 100H1200M0 200H1200M0 300H1200M0 400H1200M0 500H1200" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <path d="M200 0V630M400 0V630M600 0V630M800 0V630M1000 0V630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  
  <!-- Glowing Orbs -->
  <circle cx="200" cy="150" r="180" fill="#3b82f6" fill-opacity="0.2" filter="blur(80px)"/>
  <circle cx="1000" cy="450" r="220" fill="#8b5cf6" fill-opacity="0.2" filter="blur(90px)"/>
  <circle cx="600" cy="315" r="150" fill="#06b6d4" fill-opacity="0.15" filter="blur(70px)"/>

  <!-- Main Card Glass Box -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2"/>

  <!-- Logo & Lightning Icon -->
  <g transform="translate(140, 130)">
    <rect width="56" height="56" rx="14" fill="url(#paint1_linear)"/>
    <path d="M30 14L18 32H28L26 46L38 28H28L30 14Z" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="74" y="38" fill="white" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="38" letter-spacing="-0.5">ExamArena</text>
    <rect x="300" y="12" width="130" height="32" rx="16" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1"/>
    <text x="365" y="33" text-anchor="middle" fill="#60a5fa" font-family="'Inter', sans-serif" font-weight="700" font-size="14">AI-POWERED</text>
  </g>

  <!-- Headline -->
  <text x="140" y="260" fill="#f1f5f9" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="52" letter-spacing="-1">
    500+ Engineering &amp; Career
  </text>
  <text x="140" y="325" fill="url(#paint2_linear)" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="54" letter-spacing="-1">
    Exams &amp; Real-Time Roadmap
  </text>

  <!-- Subtitle -->
  <text x="140" y="380" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="22" font-weight="500">
    GATE • ESE • PSUs • UPSC • SSC • Banking • State AE/JE • GRE • FE/PE Exams
  </text>

  <!-- Feature Pills -->
  <g transform="translate(140, 430)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="220" height="48" rx="12" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)"/>
    <text x="110" y="30" text-anchor="middle" fill="#e2e8f0" font-family="'Inter', sans-serif" font-weight="600" font-size="16">⚡ Live Vacancies &amp; Dates</text>

    <!-- Pill 2 -->
    <rect x="236" y="0" width="200" height="48" rx="12" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)"/>
    <text x="336" y="30" text-anchor="middle" fill="#e2e8f0" font-family="'Inter', sans-serif" font-weight="600" font-size="16">📊 Syllabus &amp; Cutoffs</text>

    <!-- Pill 3 -->
    <rect x="452" y="0" width="220" height="48" rx="12" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)"/>
    <text x="562" y="30" text-anchor="middle" fill="#e2e8f0" font-family="'Inter', sans-serif" font-weight="600" font-size="16">⚖️ Side-by-Side Compare</text>
  </g>

  <!-- Definitions -->
  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 315) rotate(90) scale(400 700)">
      <stop stop-color="#0d1435"/>
      <stop offset="1" stop-color="#050810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paint1_linear" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="paint2_linear" x1="140" y1="325" x2="700" y2="325" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
</svg>
